name: AI Safety Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - recovery/v2-retain-all-work
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-safety-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-safety:
    name: Typecheck and red-team suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run AI safety gate
        run: npm run test:ai-safety
