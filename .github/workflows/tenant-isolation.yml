name: Tenant Isolation Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - recovery/v2-retain-all-work
  schedule:
    - cron: "43 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tenant-isolation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tenant-isolation-tests:
    name: Tenant isolation regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tenant isolation tests
        run: npm run test:tenant-isolation
