name: Tenant Isolation Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - codex/merge-v1-roadmaps
  schedule:
    - cron: "43 2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Audit mode for the database-backed audit"
        required: true
        default: "external_launch"
        type: choice
        options:
          - external_launch
          - standard

permissions:
  contents: read

concurrency:
  group: tenant-isolation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tenant-isolation-tests:
    name: Tenant isolation regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tenant isolation tests
        run: npm run test:tenant-isolation

  database-audit:
    name: Database tenant isolation audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: tenant-isolation-tests
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    env:
      DATABASE_URL: ${{ secrets.TENANT_ISOLATION_AUDIT_DATABASE_URL }}
      AUDIT_MODE: ${{ github.event.inputs.mode || 'external_launch' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database-backed tenant isolation audit
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::TENANT_ISOLATION_AUDIT_DATABASE_URL is not configured; database-backed tenant audit was skipped."
            exit 0
          fi
          node scripts/tenant-isolation-audit.js --mode="$AUDIT_MODE" --sample-limit=10 --json --output=tenant-isolation-audit.json

      - name: Upload tenant isolation audit evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tenant-isolation-audit
          path: tenant-isolation-audit.json
          if-no-files-found: ignore
